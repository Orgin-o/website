<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Gasprijs</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --fire:  #ff4500;
      --ember: #ff8c00;
      --gold:  #ffd166;
      --smoke: #16161a;
      --ash:   #242429;
      --mist:  #35353e;
      --pale:  #b0b0c0;
      --white: #efeff4;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: var(--smoke);
      color: var(--white);
      font-family: 'IBM Plex Mono', monospace;
      overflow: hidden;
    }

    .screen {
      height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    /* ── HEADER ── */
    header {
      background: var(--ash);
      border-bottom: 2px solid var(--fire);
      padding: 0.45rem 0.9rem 0.38rem;
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      flex-shrink: 0;
    }
    .h-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.4rem;
      letter-spacing: 0.06em;
    }
    .h-title span { color: var(--fire); }
    .h-meta {
      font-size: 0.56rem;
      color: var(--pale);
      text-align: right;
      line-height: 1.6;
    }
    .h-meta strong { color: var(--gold); }

    /* ── SHIP LANE ── */
    .ship-lane {
      background: #0d1f2d;
      border-top: 1px solid #1a3a52;
      border-bottom: 1px solid #1a3a52;
      height: 2rem;
      overflow: hidden;
      flex-shrink: 0;
      position: relative;
    }
    /* subtle wave lines */
    .ship-lane::before {
      content: '';
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        90deg,
        transparent 0px,
        transparent 18px,
        rgba(255,255,255,0.03) 18px,
        rgba(255,255,255,0.03) 20px
      );
    }
    .ship {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      font-size: 1.3rem;
      line-height: 1;
      animation: sail 18s linear infinite;
      white-space: nowrap;
    }
    @keyframes sail {
      from { left: 105%; }
      to   { left: -8%; }
    }

    /* ── CONTENT: two equal columns ── */
    .content {
      flex: 1 1 0;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.5rem;
      padding: 0.5rem 0.7rem;
      overflow: hidden;
    }

    /* ── HUB COLUMN ── */
    .col {
      display: flex;
      flex-direction: column;
      gap: 0.38rem;
      overflow: hidden;
    }

    /* Column header label */
    .col-head {
      display: flex;
      align-items: baseline;
      gap: 0.4rem;
      border-bottom: 1px solid var(--mist);
      padding-bottom: 0.22rem;
    }
    .col-hub {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.15rem;
      letter-spacing: 0.08em;
      color: var(--gold);
      line-height: 1;
    }
    .col-hub-sub {
      font-size: 0.44rem;
      color: var(--pale);
      letter-spacing: 0.06em;
    }

    /* ── DAG PRIJS BLOK ── */
    .dag-block {
      background: var(--ash);
      border: 1px solid var(--mist);
      border-top: 2px solid var(--fire);
      padding: 0.42rem 0.55rem 0.38rem;
      flex-shrink: 0;
    }
    .dag-lbl {
      font-size: 0.44rem;
      letter-spacing: 0.22em;
      color: var(--ember);
      text-transform: uppercase;
      margin-bottom: 0.15rem;
    }
    .dag-date {
      font-size: 0.44rem;
      color: var(--pale);
      letter-spacing: 0.1em;
      margin-bottom: 0.1rem;
    }
    .dag-price {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2.1rem;
      color: var(--white);
      line-height: 1;
    }
    .dag-unit {
      font-size: 0.45rem;
      color: var(--ember);
      letter-spacing: 0.1em;
    }


    /* ── MAAND BLOKKEN ── */
    .maand-lbl {
      font-size: 0.44rem;
      letter-spacing: 0.22em;
      color: var(--ember);
      text-transform: uppercase;
      margin-bottom: 0.18rem;
      flex-shrink: 0;
    }

    .mblock {
      background: var(--ash);
      border: 1px solid var(--mist);
      border-left: 3px solid var(--ember);
      padding: 0.32rem 0.5rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-shrink: 0;
    }
    .mblock.def {
      border-left-color: var(--mist);
    }

    .mblock-left {}
    .mblock-month {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 0.82rem;
      color: var(--gold);
      letter-spacing: 0.05em;
      line-height: 1;
    }
    .mblock-tag {
      font-size: 0.4rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--pale);
      margin-top: 0.06rem;
    }
    .mblock.def .mblock-tag { color: var(--mist); }

    .mblock-val {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.3rem;
      color: var(--white);
      line-height: 1;
      text-align: right;
    }
    .mblock-val small {
      font-size: 0.38rem;
      color: var(--ember);
      margin-left: 0.1rem;
    }

    /* ── FOOTER ── */
    footer {
      flex-shrink: 0;
      border-top: 1px solid var(--mist);
      padding: 0.26rem 0.7rem;
      display: flex;
      justify-content: space-between;
      font-size: 0.44rem;
      color: var(--mist);
      letter-spacing: 0.08em;
    }
    footer a { color: var(--ember); text-decoration: none; }
  </style>
</head>
<body>
<div class="screen">

  <!-- HEADER -->
  <header>
    <div class="h-title">GAS<span>PRIJS</span></div>
    <div class="h-meta">
      Peildatum <strong id="hdr-datum"></strong><br>
      EUR/MWh &nbsp;·&nbsp; ZTP · TTF
    </div>
  </header>

  <!-- SHIP LANE -->
  <div class="ship-lane">
    <div class="ship">🛢️🚢</div>
  </div>

  <!-- CONTENT: 2 kolommen -->
  <div class="content">

    <!-- ════ LINKS: ZTP ════ -->
    <div class="col">
      <div class="col-head">
        <div class="col-hub">ZTP</div>
        <div class="col-hub-sub">Zeebrugge Trading Point</div>
      </div>
      <div class="dag-block">
        <div class="dag-lbl">Dag-ahead</div>
        <div class="dag-date" id="dag-datum"></div>
        <div class="dag-price" id="ztp-dag"></div>
        <div class="dag-unit">EUR / MWh</div>
      </div>
      <div class="maand-lbl">Maandgemiddelden</div>
      <div class="mblock">
        <div class="mblock-left">
          <div class="mblock-month" id="ztp-m1-naam"></div>
          <div class="mblock-tag" id="ztp-m1-tag"></div>
        </div>
        <div class="mblock-val" id="ztp-m1-val"></div>
      </div>
      <div class="mblock def">
        <div class="mblock-left">
          <div class="mblock-month" id="ztp-m2-naam"></div>
          <div class="mblock-tag">Definitief</div>
        </div>
        <div class="mblock-val" id="ztp-m2-val"></div>
      </div>
      <div class="mblock def">
        <div class="mblock-left">
          <div class="mblock-month" id="ztp-m3-naam"></div>
          <div class="mblock-tag">Definitief</div>
        </div>
        <div class="mblock-val" id="ztp-m3-val"></div>
      </div>
    </div>

    <!-- ════ RECHTS: TTF ════ -->
    <div class="col">
      <div class="col-head">
        <div class="col-hub">TTF</div>
        <div class="col-hub-sub">Title Transfer Facility</div>
      </div>
      <div class="dag-block">
        <div class="dag-lbl">Dag-ahead</div>
        <div class="dag-date" id="dag-datum-2"></div>
        <div class="dag-price" id="ttf-dag"></div>
        <div class="dag-unit">EUR / MWh</div>
      </div>
      <div class="maand-lbl">Maandgemiddelden</div>
      <div class="mblock">
        <div class="mblock-left">
          <div class="mblock-month" id="ttf-m1-naam"></div>
          <div class="mblock-tag" id="ttf-m1-tag"></div>
        </div>
        <div class="mblock-val" id="ttf-m1-val"></div>
      </div>
      <div class="mblock def">
        <div class="mblock-left">
          <div class="mblock-month" id="ttf-m2-naam"></div>
          <div class="mblock-tag">Definitief</div>
        </div>
        <div class="mblock-val" id="ttf-m2-val"></div>
      </div>
      <div class="mblock def">
        <div class="mblock-left">
          <div class="mblock-month" id="ttf-m3-naam"></div>
          <div class="mblock-tag">Definitief</div>
        </div>
        <div class="mblock-val" id="ttf-m3-val"></div>
      </div>
    </div>

  </div><!-- /content -->

  <!-- FOOTER -->
  <footer>
    <span>© 2025 Gasprijs Monitor · excl. belastingen</span>
    <span>Bron: <a href="#">ZTP</a> · <a href="#">TTF</a></span>
  </footer>

</div>
<script>
// ╔══════════════════════════════════════════╗
// ║        VARIABELEN — HIER INVULLEN        ║
// ╠══════════════════════════════════════════╣

  const ZTP_DAG  = '46,82';   // Dagwaarde ZTP

  const ZTP_M1_NAAM = 'Maart 2026 (voorlopig)';    // Meest recente maand (voorlopig)
  const ZTP_M1      = '51,72';
  const ZTP_M2_NAAM = 'Febr. 2026';
  const ZTP_M2      = '32,61';
  const ZTP_M3_NAAM = 'Jan. 2026';
  const ZTP_M3      = '34,50';

  const TTF_DAG  = '47,56';   // Dagwaarde TTF

  const TTF_M1_NAAM = 'Maart 2026 (voorlopig)';    // Meest recente maand (voorlopig)
  const TTF_M1      = '51,64';
  const TTF_M2_NAAM = 'Febr. 2026';
  const TTF_M2      = '32,50';
  const TTF_M3_NAAM = 'Jan. 2026';
  const TTF_M3      = '34,00';

// ╚══════════════════════════════════════════╝
// Niets hieronder aanpassen

  const now  = new Date();
  const dd   = String(now.getDate()).padStart(2,'0');
  const mm   = String(now.getMonth()+1).padStart(2,'0');
  const yyyy = now.getFullYear();
  const vandaag = `${dd}-${mm}-${yyyy}`;

  const unit = '<small>€/MWh</small>';

  document.getElementById('hdr-datum').textContent   = vandaag;
  document.getElementById('dag-datum').textContent   = vandaag;
  document.getElementById('dag-datum-2').textContent = vandaag;

  document.getElementById('ztp-dag').textContent     = ZTP_DAG;
  document.getElementById('ztp-m1-naam').textContent = ZTP_M1_NAAM;
  document.getElementById('ztp-m1-tag').textContent  = 'Voorlopig';
  document.getElementById('ztp-m1-val').innerHTML    = ZTP_M1 + unit;
  document.getElementById('ztp-m2-naam').textContent = ZTP_M2_NAAM;
  document.getElementById('ztp-m2-val').innerHTML    = ZTP_M2 + unit;
  document.getElementById('ztp-m3-naam').textContent = ZTP_M3_NAAM;
  document.getElementById('ztp-m3-val').innerHTML    = ZTP_M3 + unit;

  document.getElementById('ttf-dag').textContent     = TTF_DAG;
  document.getElementById('ttf-m1-naam').textContent = TTF_M1_NAAM;
  document.getElementById('ttf-m1-tag').textContent  = 'Voorlopig';
  document.getElementById('ttf-m1-val').innerHTML    = TTF_M1 + unit;
  document.getElementById('ttf-m2-naam').textContent = TTF_M2_NAAM;
  document.getElementById('ttf-m2-val').innerHTML    = TTF_M2 + unit;
  document.getElementById('ttf-m3-naam').textContent = TTF_M3_NAAM;
  document.getElementById('ttf-m3-val').innerHTML    = TTF_M3 + unit;
</script>
</body>
</html>
